<h2 mat-dialog-title>{{ data ? 'Update' : 'Create new' }} Project</h2>

<mat-dialog-content>
    <form [formGroup]="projectForm">
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Project Name</mat-label>
            <input matInput formControlName="name" type="text" required>
        </mat-form-field>
  
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Description</mat-label>
            <input matInput formControlName="description" type="text" required>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Status</mat-label>
            <mat-select formControlName="status" required>
            <mat-option *ngFor="let s of statusNames" [value]="s">{{s}}</mat-option>
            </mat-select>
        </mat-form-field>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cancel</button>
    <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="projectForm.invalid">
        {{ data ? 'Update' : 'Create' }}
    </button>
</mat-dialog-actions>
