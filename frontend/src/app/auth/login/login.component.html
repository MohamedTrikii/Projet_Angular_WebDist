<div class="login-container">
  <div class="login-card mat-elevation-z8">
    <div class="login-header">
      <div class="logo-circle">
        <mat-icon color="primary" style="font-size: 40px; width: 40px; height: 40px;">science</mat-icon>
      </div>
      <h2 class="login-title">Bienvenue</h2>
      <p class="login-subtitle">Connectez-vous pour accéder au Laboratoire</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="login()" class="login-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Identifiant ou E-mail</mat-label>
        <mat-icon matPrefix color="primary" style="margin-right: 8px;">person</mat-icon>
        <input
          matInput
          type="text"
          formControlName="username"
          placeholder="Ex: admin"
          required>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Mot de passe</mat-label>
        <mat-icon matPrefix color="primary" style="margin-right: 8px;">lock</mat-icon>
        <input
          matInput
          type="password"
          formControlName="password"
          placeholder="•••••"
          required>
      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        class="login-btn"
        [disabled]="form.invalid">
        Se connecter
      </button>

      <div class="login-footer">
        <p class="hint">Connexion requise : <strong>admin</strong> / <strong>admin</strong></p>
      </div>
    </form>
  </div>
</div>
