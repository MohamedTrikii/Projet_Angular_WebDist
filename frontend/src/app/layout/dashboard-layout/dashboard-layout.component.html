<mat-sidenav-container>

  <!-- The side nav -->
  <mat-sidenav #drawer fixedInViewport="true" mode="over" opened="false" style="width: 230px;">
    <mat-toolbar color="primary" fxLayout fxLayoutGap="16px">
      <mat-icon>school</mat-icon>
      <span> Laboratoire </span>
    </mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard"><mat-icon>dashboard</mat-icon><span> Dashboard</span> </a>
      <a mat-list-item routerLink="/users"><mat-icon>supervised_user_circle</mat-icon><span> Employees</span></a>
      <a mat-list-item routerLink="/projects"> <mat-icon>settings</mat-icon><span> Projects</span></a>
      <a mat-list-item routerLink="/affectations"><mat-icon>gradient</mat-icon><span> Affectations</span></a>
      <a mat-list-item routerLink="/categories"><mat-icon>event_note</mat-icon><span> Categories</span></a>
      <a mat-list-item (click)="logout()" style="cursor:pointer"><mat-icon>login</mat-icon><span> Logout</span></a>
    </mat-nav-list>
  </mat-sidenav>
  <!-- EO: Side nav-->

  <!-- Side nav content-->
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <div fxFlex fxLayout fxLayoutAlign="start center">
        <button type="button" aria-label="Toggle sidenav" class="toolbar-button" mat-icon-button
          (click)="drawer.toggle()">
          <mat-icon aria-label="Side nav toggle icon">menu</mat-icon><span>Gestion des projets</span>
        </button>
      </div>


      <div fxFlex></div>

      <div class="toolbar-separator"></div>
    </mat-toolbar>

    <div class="content mt-80 mx-16">
      <br>
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>
  <!-- EO: Side nav content-->

</mat-sidenav-container>
