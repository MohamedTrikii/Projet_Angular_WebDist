<div class="login-container">
  <div class="login-card">
    <h2 class="login-title">Connexion</h2>
    <p class="login-subtitle">Veuillez saisir vos identifiants</p>

    <form (ngSubmit)="Login()" #loginForm="ngForm" class="login-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input
          matInput
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          email>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Mot de passe</mat-label>
        <input
          matInput
          type="password"
          name="password"
          [(ngModel)]="password"
          required>
      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        class="login-btn"
        [disabled]="loginForm.invalid">
        Login
      </button>
    </form>
  </div>
</div>
