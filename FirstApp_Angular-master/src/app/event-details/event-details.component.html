<h2 mat-dialog-title>Event Details</h2>

<mat-dialog-content *ngIf="event">

  <p><strong>Title :</strong> {{event.value.title}}</p>
  <p><strong>Place :</strong> {{event.value.place}}</p>
  <p><strong>Date début :</strong> {{event.value.datedebut | date}}</p>
  <p><strong>Date fin :</strong> {{event.value.datefin | date}}</p>

</mat-dialog-content>

<mat-dialog-actions>
  <button mat-raised-button mat-dialog-close>Close</button>
</mat-dialog-actions>
